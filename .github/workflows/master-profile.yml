name: Master Profile Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Generate the 3D Isometric City
      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: nirabbaraha

      # 2. Generate the Animated Snake
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: nirabbaraha
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 3. Move the 3D City folder into the dist folder so both are deployed
      - name: Move City to Dist
        run: |
          mkdir -p dist
          mv profile-3d-contrib dist/

      # 4. Push ONLY the contents of the 'dist' folder to the 'output' branch
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
